{% extends "./base.html" %}

{% block head %}
  <title>{{ path|title }}</title>
{% endblock %}

{% block content %}
  <h1 class="title">{{ path|title }}</h1>
  <div class="page-content">
    <p>
      This page does not exist.
      {% if let Some(user) = current_user %}
        You can create it <a href="/~/{{ path }}?action=edit">here</a>.
      {% endif %}
    </p>
  </div>
{% endblock %}
