{% extends "shell.html" %}

{% block body %}
  <div class="view-content">
    <nav id="sidebar">
      <a href="/~/Index">
        <h1>~/inferno</h1>
      </a>
      {% if let Some(user) = current_user %}
        <form action="/~account/logout" method="post" class="user-digest">
          <p>
            Signed in as
            <span class="username">{{ user.username }}</span>
          </p>
          <input type="hidden" name="redirect_to" value="{{ request_uri }}">
          <input class="sidebar-item" type="submit" value="Logout">
        </form>
      {% else %}
        <div class="user-digest">
          <a class="right" href="/~account/login?redirect_to={{ request_uri|urlencode }}">Login</a>
        </div>
      {% endif %}
      {% if let Some(sidebar) = sidebar %}
        <div id="sidebar-content">
          {{ sidebar.rendered()|safe }}
        </div>
      {% endif %}
    </nav>
    <main>
      {% block main %}{% endblock %}
    </main>
  </div>
{% endblock %}
